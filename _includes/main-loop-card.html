<article class="note-card">
  <div class="note-card-content">
    <h2 class="note-card-title">
      <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
    </h2>
    <p class="note-card-excerpt">
      {{ post.excerpt | strip_html | strip_newlines | truncate: 186 }}
    </p>
    <span class="note-card-date">{{ post.date | date: '%b %Y' }}</span>
  </div>
  {% if post.image %}
    <a href="{{ site.baseurl }}{{ post.url }}">
      <img class="note-card-image" src="{% if post.image contains '://' %}{{ post.image }}{% else %}{{ site.baseurl }}/{{ post.image }}{% endif %}" alt="{{ post.title }}">
    </a>
  {% endif %}
</article>
